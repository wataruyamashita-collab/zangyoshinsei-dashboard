<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root {
      --blue: #17466f;
      --blue-dark: #0f3554;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f9fbfd;
      --line: #d7dee8;
      --line-soft: #edf1f7;
      --text: #1f2937;
      --sub: #667085;
      --good: #137333;
      --bad: #b42318;
      --warn: #b26a00;
      --neutral: #64748b;
      --chip: #eaf1f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    .app-header {
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .01em;
    }

    .app-subtitle {
      font-size: 12px;
      opacity: .9;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .actions button {
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.12);
      color: white;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .actions button:hover {
      background: rgba(255,255,255,.22);
    }

    .wrap {
      padding: 18px 24px 28px;
    }

    .status,
    .error-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      color: var(--sub);
      white-space: pre-wrap;
    }

    .error-box {
      background: #fce8e6;
      color: var(--bad);
      border-color: #f3b8b2;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 12px;
      color: var(--sub);
      min-height: 58px;
    }

    .meta-card b {
      display: block;
      color: var(--blue);
      font-size: 13px;
      margin-top: 4px;
      word-break: break-word;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--chip);
      border-radius: 12px 12px 0 0;
      padding: 11px 22px;
      cursor: pointer;
      font-weight: 800;
      color: var(--blue);
      min-width: 190px;
      text-align: center;
    }

    .tab.active {
      background: var(--surface);
      border-bottom-color: var(--surface);
      box-shadow: 0 -1px 2px rgba(16,24,40,.04);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .department-shell {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 0 14px 14px 14px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(16,24,40,.04);
      margin-top: -1px;
    }

    .department-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .department-title {
      font-size: 18px;
      font-weight: 900;
      color: var(--blue);
    }

    .department-period {
      font-size: 12px;
      color: var(--sub);
    }

    .period-main {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }

    .period-sub {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-soft);
      padding: 14px;
      margin-top: 16px;
    }

    .period-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
    }

    .period-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--blue);
    }

    .period-title small {
      font-size: 12px;
      color: var(--sub);
      font-weight: 700;
      margin-left: 8px;
    }

    .period-info {
      color: var(--sub);
      font-size: 12px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .support-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .kpi-card {
      background: #fbfdff;
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      padding: 14px;
      min-height: 108px;
    }

    .kpi-card.primary {
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      border-color: #d7e5f5;
    }

    .kpi-label {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--sub);
      font-weight: 800;
    }

    .kpi-value {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -.02em;
    }

    .kpi-delta {
      font-size: 12px;
      margin-top: 7px;
      font-weight: 800;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .neutral { color: var(--neutral); }

    .attention {
      background: #fff8ed;
      border: 1px solid #ffe0ad;
      border-radius: 14px;
      padding: 12px;
      margin: 12px 0;
    }

    .attention-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--warn);
      margin-bottom: 8px;
    }

    .attention-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .attention-chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #f5c36d;
      padding: 5px 9px;
      color: #8a4b00;
      font-size: 12px;
      font-weight: 800;
    }

    .table-card {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      margin-top: 12px;
    }

    .table-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line-soft);
      background: #fbfdff;
    }

    .table-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--blue);
    }

    .table-caption {
      font-size: 12px;
      color: var(--sub);
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #edf1f7;
      padding: 9px 10px;
      text-align: right;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      background: #eef4fb;
      color: #17324d;
      font-weight: 900;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th:first-child, td:first-child {
      text-align: left;
      min-width: 220px;
      position: sticky;
      left: 0;
      background: inherit;
      z-index: 0;
    }

    th:first-child {
      background: #eef4fb;
      z-index: 2;
    }

    td:first-child {
      background: white;
      font-weight: 800;
    }

    .metric-main {
      font-weight: 900;
      display: block;
    }

    .metric-sub {
      font-size: 11px;
      font-weight: 800;
      display: block;
      margin-top: 2px;
    }

    .alert {
      display: inline-block;
      border-radius: 999px;
      background: #fff4e5;
      color: var(--warn);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .ok {
      display: inline-block;
      border-radius: 999px;
      background: #e6f4ea;
      color: var(--good);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .note {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    @media print {
      .actions, .tabs {
        display: none !important;
      }

      .wrap {
        padding: 10px;
      }

      .section {
        display: none !important;
      }

      .section.active {
        display: block !important;
      }

      .department-shell,
      .period-main,
      .period-sub,
      .table-card {
        box-shadow: none;
      }

      .table-wrap {
        max-height: none;
        overflow: visible;
      }

      body {
        background: white;
      }
    }
  </style>
</head>
<body>
  <div class="app-header">
    <div>
      <div class="app-title" id="appTitle">TeamSpirit 残業申請・承認ダッシュボード</div>
      <div class="app-subtitle">残業申請・承認の事前運用状況を月次・週次で確認します。</div>
    </div>
    <div class="actions">
      <button class="admin-action" onclick="loadData()">再読み込み</button>
      <button onclick="window.print()">表示中のタブを印刷</button>
      <button onclick="google.script.host.close()">閉じる</button>
    </div>
  </div>

  <div class="wrap">
    <div id="message" class="status">ダッシュボードを読み込んでいます...</div>

    <div id="content" style="display:none;">
      <div class="meta">
        <div class="meta-card">対象年月<b id="targetMonth"></b></div>
        <div class="meta-card">対象週<b id="targetWeek"></b></div>
        <div class="meta-card admin-only">最終取込日時<b id="lastImportTime"></b></div>
        <div class="meta-card admin-only">エラー・確認件数<b id="errorCount"></b></div>
      </div>

      <div class="tabs">
        <button id="tabStaff" class="tab active" onclick="switchTab('staff')">スタッフ部門</button>
        <button id="tabSales" class="tab" onclick="switchTab('sales')">営業部門（参考）</button>
      </div>

      <div id="staff" class="section active"></div>
      <div id="sales" class="section"></div>

      <div class="note admin-only" id="adminPanel"></div>
      <div class="note" id="dashboardNote"></div>
    </div>
  </div>

  <script>
    const Direction = {
      HIGHER_IS_GOOD: 'higher',
      LOWER_IS_GOOD: 'lower',
      NEUTRAL: 'neutral'
    };

    const DASHBOARD_MODE = '<?= dashboardMode ?>';
    let dashboardData = null;
    let dashboardLoadTimer = null;

    function loadData() {
      const message = document.getElementById('message');
      const content = document.getElementById('content');

      message.className = 'status';
      message.textContent = 'ダッシュボードを読み込んでいます...';
      message.style.display = 'block';
      content.style.display = 'none';

      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        message.className = 'error-box';
        message.textContent = 'このHTMLはブラウザで直接開けません。スプレッドシートのメニュー「TeamSpirit取込」→「閲覧用ダッシュボードを開く」から開いてください。';
        return;
      }

      if (dashboardLoadTimer) {
        clearTimeout(dashboardLoadTimer);
      }
      dashboardLoadTimer = setTimeout(function() {
        message.className = 'error-box';
        message.textContent = 'ダッシュボードデータの取得に時間がかかっています。\n\n' +
          '考えられる原因：取込データ件数が多い、シートの読込範囲が広い、またはサーバー側処理が停止しています。\n' +
          'Apps Script画面の「実行数」で getHtmlDashboardData の結果を確認してください。';
      }, 45000);

      google.script.run
        .withSuccessHandler(function(data) {
          if (dashboardLoadTimer) {
            clearTimeout(dashboardLoadTimer);
            dashboardLoadTimer = null;
          }

          try {
            dashboardData = normalizeDashboardPayload(data);

            if (!dashboardData.ok) {
              message.className = 'error-box';
              message.textContent = dashboardData.message || 'ダッシュボードデータを取得できませんでした。';
              return;
            }

            render(dashboardData);
            message.style.display = 'none';
            content.style.display = 'block';
          } catch (error) {
            message.className = 'error-box';
            message.textContent = 'ダッシュボード描画時にエラーが発生しました。\n\n' +
              (error && error.message ? error.message : error) +
              '\n\nサーバーから返ったデータ構造とDashboard.html側の参照が一致していない可能性があります。';
          }
        })
        .withFailureHandler(function(error) {
          if (dashboardLoadTimer) {
            clearTimeout(dashboardLoadTimer);
            dashboardLoadTimer = null;
          }
          message.className = 'error-box';
          message.textContent = 'ダッシュボードの読み込みでエラーが発生しました。\n\n' + (error && error.message ? error.message : error);
        })
        .getHtmlDashboardData(DASHBOARD_MODE);
    }


    function normalizeDashboardPayload(data) {
      if (typeof data === 'string') {
        try {
          data = JSON.parse(data);
        } catch (error) {
          return {
            ok: false,
            message: 'サーバーから返ったデータを解析できませんでした。\n\n' +
              (error && error.message ? error.message : error)
          };
        }
      }

      if (!data || typeof data !== 'object') {
        return { ok: false, message: 'サーバーから有効なデータが返っていません。' };
      }

      data.settings = data.settings || {};
      data.errorCount = Number(data.errorCount || 0);
      data.monthly = data.monthly || {};
      data.weekly = data.weekly || {};
      data.monthly.staff = normalizeCategoryPayload(data.monthly.staff);
      data.monthly.sales = normalizeCategoryPayload(data.monthly.sales);
      data.weekly.staff = normalizeCategoryPayload(data.weekly.staff);
      data.weekly.sales = normalizeCategoryPayload(data.weekly.sales);
      data.monthly.label = data.monthly.label || '';
      data.monthly.previousLabel = data.monthly.previousLabel || '';
      data.weekly.label = data.weekly.label || '';
      data.weekly.previousLabel = data.weekly.previousLabel || '';
      return data;
    }

    function normalizeCategoryPayload(category) {
      const emptyTotal = {
        count: 0,
        beforeApplyRate: 0,
        beforeApproveRate: 0,
        nextDayApproveRate: 0,
        notApprovedCount: 0
      };
      return {
        category: category && category.category ? category.category : '',
        current: Object.assign({}, emptyTotal, category && category.current ? category.current : {}),
        previous: Object.assign({}, emptyTotal, category && category.previous ? category.previous : {}),
        diff: Object.assign({
          count: 0,
          countGrowth: 0,
          beforeApplyRate: 0,
          beforeApproveRate: 0,
          nextDayApproveRate: 0,
          notApprovedCount: 0
        }, category && category.diff ? category.diff : {}),
        details: Array.isArray(category && category.details) ? category.details : []
      };
    }


    function formatMonthLabel(value) {
      const d = parseDisplayDate(value);
      if (d) return d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
      const text = String(value || '').trim();
      const m = text.match(/^(\d{4})[-/](\d{1,2})/);
      return m ? (Number(m[1]) + '年' + Number(m[2]) + '月') : text;
    }

    function formatWeekLabel(weekKey, weekStart, weekEnd) {
      const start = parseDisplayDate(weekStart) || parseDisplayDate(String(weekKey || '').replace('週', ''));
      const end = parseDisplayDate(weekEnd);
      if (!start) return String(weekKey || '').trim();
      const title = start.getFullYear() + '年' + (start.getMonth() + 1) + '月' + start.getDate() + '日週';
      return end ? title + '（' + shortDate(start) + '〜' + shortDate(end) + '）' : title;
    }

    function shortDate(date) {
      return (date.getMonth() + 1) + '/' + date.getDate();
    }

    function parseDisplayDate(value) {
      if (!value) return null;
      const text = String(value).trim().replace(/年|月/g, '/').replace(/日/g, '').replace(/-/g, '/');
      let m = text.match(/^(\d{4})\/(\d{1,2})(?:\/(\d{1,2}))?/);
      if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3] || 1));
      m = text.match(/^(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})/i);
      if (m) {
        const parsed = new Date(value);
        if (!isNaN(parsed.getTime())) return parsed;
      }
      const parsed = new Date(value);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    function render(data) {
      const isAdmin = !!data.isAdmin;
      document.body.dataset.mode = data.mode || DASHBOARD_MODE;
      document.getElementById('appTitle').textContent = isAdmin
        ? 'TeamSpirit 残業申請・承認ダッシュボード（admin用）'
        : 'TeamSpirit 残業申請・承認ダッシュボード（閲覧用）';
      Array.prototype.forEach.call(document.querySelectorAll('.admin-only, .admin-action'), function(el) {
        el.style.display = isAdmin ? '' : 'none';
      });
      document.getElementById('targetMonth').textContent = formatMonthLabel(data.settings.targetMonth) || '-';
      document.getElementById('targetWeek').textContent = formatWeekLabel(data.settings.targetWeek, data.settings.weekStart, data.settings.weekEnd) || '-';
      document.getElementById('lastImportTime').textContent = data.settings.lastImportTime || '-';
      document.getElementById('errorCount').textContent = data.errorCount + '件';
      document.getElementById('adminPanel').textContent = isAdmin
        ? 'admin情報：エラー・確認件数 ' + data.errorCount + '件 ／ 最終取込 ' + (data.latestLog && data.latestLog.importTime ? data.latestLog.importTime : '-') + ' ／ サーバー処理 ' + (data.serverElapsedMs || 0) + 'ms'
        : '';
      document.getElementById('dashboardNote').textContent = data.settings.dashboardNote || '';

      document.getElementById('staff').innerHTML = renderDepartment({
        title: 'スタッフ部門',
        monthly: data.monthly.staff,
        weekly: data.weekly.staff,
        monthlyLabel: data.monthly.label,
        previousMonthLabel: data.monthly.previousLabel,
        weeklyLabel: data.weekly.label,
        previousWeekLabel: data.weekly.previousLabel,
        isReference: false
      });

      document.getElementById('sales').innerHTML = renderDepartment({
        title: '営業部門（参考）',
        monthly: data.monthly.sales,
        weekly: data.weekly.sales,
        monthlyLabel: data.monthly.label,
        previousMonthLabel: data.monthly.previousLabel,
        weeklyLabel: data.weekly.label,
        previousWeekLabel: data.weekly.previousLabel,
        isReference: true
      });
    }

    function switchTab(name) {
      document.getElementById('tabStaff').classList.toggle('active', name === 'staff');
      document.getElementById('tabSales').classList.toggle('active', name === 'sales');
      document.getElementById('staff').classList.toggle('active', name === 'staff');
      document.getElementById('sales').classList.toggle('active', name === 'sales');
    }

    function renderDepartment(props) {
      const monthlyLabel = formatMonthLabel(props.monthlyLabel);
      const previousMonthLabel = formatMonthLabel(props.previousMonthLabel);
      const weeklyLabel = formatWeekLabel(props.weeklyLabel);
      const previousWeekLabel = formatWeekLabel(props.previousWeekLabel);
      const monthly = renderPeriod({
        importance: 'main',
        title: '月次',
        subtitle: props.isReference ? '営業部門は参考集計です。' : '当月の集計結果です。',
        category: props.monthly,
        label: monthlyLabel,
        previousLabel: previousMonthLabel,
        compareLabel: '前月'
      });

      const weekly = renderPeriod({
        importance: 'sub',
        title: '週次',
        subtitle: '対象週の集計結果です。',
        category: props.weekly,
        label: weeklyLabel,
        previousLabel: previousWeekLabel,
        compareLabel: '前週'
      });

      return `
        <div class="department-shell">
          <div class="department-head">
            <div class="department-title">${escapeHtml(props.title)}</div>
            <div class="department-period">週次：${escapeHtml(weeklyLabel || '-')} ／ 月次：${escapeHtml(monthlyLabel || '-')}</div>
          </div>
          ${weekly}
          ${monthly}
        </div>
      `;
    }

    function renderPeriod(props) {
      const className = props.importance === 'main' ? 'period-main' : 'period-sub';

      return `
        <div class="${className}">
          <div class="period-header">
            <div class="period-title">${escapeHtml(props.title)}<small>${escapeHtml(props.subtitle)}</small></div>
            <div class="period-info">対象：${escapeHtml(props.label || '-')} ／ ${escapeHtml(props.compareLabel)}：${escapeHtml(props.previousLabel || '-')}</div>
          </div>
          ${renderKpis(props.category, props.compareLabel)}
          ${renderAttention(props.category, props.title)}
          ${renderDetailTable(props.category, props.title + ' 部署別明細', props.compareLabel)}
        </div>
      `;
    }

    function renderKpis(category, compareLabel) {
      const c = category.current;
      const d = category.diff;

      return `
        <div class="kpi-grid">
          ${renderKpi('定時前申請率', pct(c.beforeApplyRate), pt(d.beforeApplyRate), d.beforeApplyRate, Direction.HIGHER_IS_GOOD, true, compareLabel)}
          ${renderKpi('定時前承認率', pct(c.beforeApproveRate), pt(d.beforeApproveRate), d.beforeApproveRate, Direction.HIGHER_IS_GOOD, true, compareLabel)}
          ${renderKpi('翌日承認率', pct(c.nextDayApproveRate), pt(d.nextDayApproveRate), d.nextDayApproveRate, Direction.HIGHER_IS_GOOD, true, compareLabel)}
        </div>
        <div class="support-grid">
          ${renderKpi('申請件数', c.count + '件', signedNum(d.count) + '件', d.count, Direction.NEUTRAL, false, compareLabel)}
          ${renderKpi('未承認件数', c.notApprovedCount + '件', signedNum(d.notApprovedCount) + '件', d.notApprovedCount, Direction.LOWER_IS_GOOD, false, compareLabel)}
          ${renderKpi('確認部署数', attentionDepartments(category).length + '部署', '', 0, Direction.NEUTRAL, false, '')}
        </div>
      `;
    }

    function renderKpi(label, value, deltaText, deltaValue, direction, primary, compareLabel) {
      const color = scoreClass(deltaValue, direction);
      return `
        <div class="kpi-card ${primary ? 'primary' : ''}">
          <div class="kpi-label">${escapeHtml(label)}</div>
          <div class="kpi-value">${escapeHtml(value)}</div>
          <div class="kpi-delta ${color}">${deltaText ? escapeHtml(compareLabel + '比：' + deltaText) : '—'}</div>
        </div>
      `;
    }

    function renderAttention(category, periodTitle) {
      const attentionTitle = (periodTitle || '') + '確認対象部署';
      const targets = attentionDepartments(category);

      if (targets.length === 0) {
        return `
          <div class="attention" style="background:#f0f8f2;border-color:#cce8d3;">
            <div class="attention-title" style="color:var(--good);">${escapeHtml(attentionTitle)}</div>
            <div class="attention-list">
              <span class="attention-chip" style="border-color:#b8dfc1;color:var(--good);">現時点で要確認部署はありません</span>
            </div>
          </div>
        `;
      }

      return `
        <div class="attention">
          <div class="attention-title">${escapeHtml(attentionTitle)}</div>
          <div class="attention-list">
            ${targets.map(row => `
              <span class="attention-chip">${escapeHtml(row.deptName)}：承認率 ${pct(row.beforeApproveRate)}／未承認 ${num(row.notApprovedCount)}件</span>
            `).join('')}
          </div>
        </div>
      `;
    }

    function attentionDepartments(category) {
      return (category.details || [])
        .filter(row => row.alert || Number(row.notApprovedCount || 0) > 0)
        .sort((a, b) => {
          if (Number(b.notApprovedCount || 0) !== Number(a.notApprovedCount || 0)) {
            return Number(b.notApprovedCount || 0) - Number(a.notApprovedCount || 0);
          }
          return Number(a.beforeApproveRate || 0) - Number(b.beforeApproveRate || 0);
        })
        .slice(0, 5);
    }

    function renderDetailTable(category, title, compareLabel) {
      const rows = category.details || [];

      const body = rows.length === 0
        ? `<tr><td colspan="7">対象データがありません。</td></tr>`
        : rows.map(row => `
          <tr>
            <td>${escapeHtml(row.deptName)}</td>
            <td>${renderCountCell(row.count, row.countDiff, compareLabel)}</td>
            <td>${renderRateCell(row.beforeApplyRate, row.beforeApplyRateDiff, compareLabel)}</td>
            <td>${renderRateCell(row.beforeApproveRate, row.beforeApproveRateDiff, compareLabel)}</td>
            <td>${renderRateCell(row.nextDayApproveRate, row.nextDayApproveRateDiff, compareLabel)}</td>
            <td>${renderLowerGoodCountCell(row.notApprovedCount, row.notApprovedCountDiff, compareLabel)}</td>
            <td>${row.alert ? '<span class="alert">' + escapeHtml(row.alert) + '</span>' : '<span class="ok">良好</span>'}</td>
          </tr>
        `).join('');

      return `
        <div class="table-card">
          <div class="table-head">
            <div class="table-title">${escapeHtml(title)}</div>
            <div class="table-caption">差分は${escapeHtml(compareLabel)}比</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>部署名</th>
                  <th>申請件数</th>
                  <th>定時前申請率</th>
                  <th>定時前承認率</th>
                  <th>翌日承認率</th>
                  <th>未承認</th>
                  <th>判定</th>
                </tr>
              </thead>
              <tbody>${body}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderCountCell(value, diff, compareLabel) {
      return `
        <span class="metric-main">${num(value)}件</span>
        <span class="metric-sub neutral">${escapeHtml(compareLabel)}比：${signedNum(diff)}件</span>
      `;
    }

    function renderRateCell(value, diff, compareLabel) {
      return `
        <span class="metric-main">${pct(value)}</span>
        <span class="metric-sub ${scoreClass(diff, Direction.HIGHER_IS_GOOD)}">${escapeHtml(compareLabel)}比：${pt(diff)}</span>
      `;
    }

    function renderLowerGoodCountCell(value, diff, compareLabel) {
      const n = Number(value || 0);
      const klass = n > 0 ? 'bad' : 'good';
      return `
        <span class="metric-main ${klass}">${num(n)}件</span>
        <span class="metric-sub ${scoreClass(diff, Direction.LOWER_IS_GOOD)}">${escapeHtml(compareLabel)}比：${signedNum(diff)}件</span>
      `;
    }

    function scoreClass(value, direction) {
      const n = Number(value || 0);

      if (direction === Direction.NEUTRAL || n === 0) {
        return 'neutral';
      }

      if (direction === Direction.HIGHER_IS_GOOD) {
        return n > 0 ? 'good' : 'bad';
      }

      if (direction === Direction.LOWER_IS_GOOD) {
        return n < 0 ? 'good' : 'bad';
      }

      return 'neutral';
    }

    function pct(value) {
      const n = Number(value || 0);
      return (n * 100).toFixed(1) + '%';
    }

    function pt(value) {
      const n = Number(value || 0) * 100;
      const sign = n > 0 ? '+' : '';
      return sign + n.toFixed(1) + 'pt';
    }

    function num(value) {
      return Number(value || 0).toLocaleString('ja-JP');
    }

    function signedNum(value) {
      const n = Number(value || 0);
      const sign = n > 0 ? '+' : '';
      return sign + n.toLocaleString('ja-JP');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadData();
  </script>
</body>
</html>
